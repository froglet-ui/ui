name: Publish to npm

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish @froglet/ui
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -w packages/froglet-ui

      - name: Publish
        run: npm publish -w packages/froglet-ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}